<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>域名占位页 | Domain Portfolio</title>
    <meta name="description" content="Domain placeholder page with uptime monitoring and analytics">
    
    <!-- Umami Analytics - 已配置 -->
    <script async defer data-website-id="f469bbe5-6dc7-469a-a527-e4b5dbaef541" src="https://cloud.umami.is/script.js"></script>
    
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a2e;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0b0;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --border: #2a2a3e;
            --success: #22c55e;
            --warning: #f59e0b;
            --error: #ef4444;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }
        
        [data-theme="light"] {
            --bg-primary: #f8fafc;
            --bg-secondary: #f1f5f9;
            --bg-card: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --border: #e2e8f0;
            --success: #16a34a;
            --warning: #d97706;
            --error: #dc2626;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }
        
        .bg-animation {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.03;
            background: 
                radial-gradient(circle at 20% 50%, var(--accent) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, var(--accent) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, var(--success) 0%, transparent 50%);
            animation: bgPulse 15s ease-in-out infinite;
        }
        
        @keyframes bgPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        header {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        [data-theme="light"] header {
            background: rgba(248, 250, 252, 0.8);
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .theme-toggle {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 0.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s;
        }
        
        .theme-toggle:hover { border-color: var(--accent); }
        .theme-toggle svg { width: 20px; height: 20px; fill: var(--text-secondary); }
        
        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }
        
        .hero {
            text-align: center;
            margin-bottom: 4rem;
        }
        
        .hero h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .hero p {
            font-size: 1.25rem;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto 2rem;
        }
        
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 50px;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        
        .badge .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .domains-section { margin-bottom: 4rem; }
        
        .section-title {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .domains-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        
        .domain-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .domain-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--accent-hover));
            transform: scaleX(0);
            transition: transform 0.3s;
        }
        
        .domain-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow);
            border-color: var(--accent);
        }
        
        .domain-card:hover::before { transform: scaleX(1); }
        
        .domain-name {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--accent);
        }
        
        .domain-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }
        
        .status-indicator {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--success);
        }
        
        .domain-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        
        .domain-actions {
            margin-top: 1rem;
            display: flex;
            gap: 0.5rem;
        }
        
        .btn {
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.875rem;
            text-decoration: none;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }
        
        .btn-primary {
            background: var(--accent);
            color: white;
        }
        
        .btn-primary:hover { background: var(--accent-hover); }
        
        .btn-secondary {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        
        .btn-secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        
        .monitor-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 4rem;
        }
        
        .monitor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }
        
        .monitor-card {
            padding: 1.5rem;
            background: var(--bg-secondary);
            border-radius: 8px;
            text-align: center;
        }
        
        .monitor-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
            margin: 0.5rem 0;
        }
        
        .monitor-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        
        .uptime-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .uptime-status {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.25rem 0.75rem;
            background: var(--bg-secondary);
            border-radius: 50px;
            font-size: 0.875rem;
            font-weight: 500;
        }
        
        .uptime-badge img { height: 20px; max-width: 100%; }
        
        footer {
            border-top: 1px solid var(--border);
            padding: 2rem;
            text-align: center;
            color: var(--text-secondary);
        }
        
        .social-links {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        
        .social-links a {
            color: var(--text-secondary);
            transition: color 0.3s;
        }
        
        .social-links a:hover { color: var(--accent); }
        
        @media (max-width: 768px) {
            .hero h1 { font-size: 2rem; }
            .domains-grid { grid-template-columns: 1fr; }
            .monitor-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <script>
        // 域名配置 - 已填入所有域名
        const domains = [
            {
                name: "furryk.ccwu.cc",
                status: "活跃",
                description: "开发中",
                expiry: "-",
                forSale: false,
                url: "https://furryk.ccwu.cc"
            },
            {
                name: "furry.ddns.ge",

                description: "占位",
                expiry: "-",
                forSale: false,
                url: "https://furry.ddns.ge"
            },
            {
                name: "furui.de5.net",
                status: "开发中",
                description: "占位",
                expiry: "-",
                forSale: false,
                url: "https://furui.de5.net"
            },
            {
                name: "ts-zx.de5.net",
                status: "开发中",
                description: "占位",
                expiry: "-",
                forSale: false,
                url: "https://ts-zx.de5.net"
            },
            {
                name: "zgcptszx.dpdns.org",
                status: "开发中",
                description: "占位",
                expiry: "-",
                forSale: false,
                url: "https://zgcptszx.dpdns.org"
            },
            {
                name: "furui.dpdns.org",
                status: "开发中",
                description: "占位",
                expiry: "-",
                forSale: false,
                url: "https://furui.dpdns.org"
            },
            {
                name: "furry.abrdns.com",
                status: "开发中",
                description: "占位",
                expiry: "-",
                forSale: false,
                url: "https://furry.abrdns.com"
            },
            {
                name: "furry.nacon.site",
                status: "活跃",
                description: "K的个人主页（代理部署）",
                expiry: "2026/10/16",
                forSale: false,
                url: "https://furry.nacon.site"
            },
            {
                name: "tszx.zh.kg",
                status: "占位",
                description: "四级子域免费待售",
                expiry: "-",
                forSale: true,
                price: "免费",
                url: "mailto:yxdlzy@outlook.com?subject=子域申请：tszx.zh.kg"
            }
        ];

        // 渲染域名卡片
        function renderDomains() {
            const grid = document.getElementById('domains-grid');
            grid.innerHTML = domains.map(domain => `
                <div class="domain-card">
                    <div class="domain-name">${domain.name}</div>
                    <div class="domain-status">
                        <span class="status-indicator" style="background: ${getStatusColor(domain.status)}"></span>
                        ${domain.status}
                        ${domain.forSale ? '<span style="color: var(--warning); margin-left: 0.5rem;">● 出售中</span>' : ''}
                    </div>
                    <p style="color: var(--text-secondary); font-size: 0.875rem; margin-bottom: 1rem;">
                        ${domain.description}
                    </p>
                    <div class="domain-meta">
                        <span>到期: ${domain.expiry}</span>
                        ${domain.price ? `<span style="color: var(--accent);">${domain.price}</span>` : ''}
                    </div>
                    <div class="domain-actions">
                        <a href="${domain.url}" class="btn btn-primary" ${domain.url.startsWith('http') ? 'target="_blank" rel="noopener noreferrer"' : ''}>
                            ${domain.forSale ? '联系购买' : '访问网站'}
                        </a>
                        ${domain.forSale ? `<button class="btn btn-secondary" onclick="copyDomain('${domain.name}')">复制域名</button>` : ''}
                    </div>
                </div>
            `).join('');
        }
        
        function getStatusColor(status) {
            const colors = {
                '活跃': 'var(--success)',
                '开发中': 'var(--accent)',
                '待售': 'var(--warning)',
                '占位': 'var(--text-secondary)'
            };
            return colors[status] || 'var(--text-secondary)';
        }
        
        function copyDomain(domain) {
            navigator.clipboard.writeText(domain).then(() => {
                alert(`已复制: ${domain}`);
            });
        }
        
        // 主题切换
        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            
            document.querySelector('.sun').style.display = next === 'light' ? 'block' : 'none';
            document.querySelector('.moon').style.display = next === 'dark' ? 'block' : 'none';
        }
        
        // 加载保存的主题
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        document.querySelector('.sun').style.display = savedTheme === 'light' ? 'block' : 'none';
        document.querySelector('.moon').style.display = savedTheme === 'dark' ? 'block' : 'none';
        
        // 设置年份
        document.getElementById('year').textContent = new Date().getFullYear();
        
        // 初始化
        renderDomains();
        
        // ============================================
        // 从 UptimeRobot API 获取真实监控数据
        // 使用 Monitor-Specific API Key: m803520589-2c3b4d1483276c066898cf89
        // ============================================
        async function fetchUptimeData() {
            const API_KEY = 'm803520589-2c3b4d1483276c066898cf89';
            const MONITOR_ID = '803520589';
            
            try {
                const response = await fetch('https://api.uptimerobot.com/v2/getMonitors', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `api_key=${encodeURIComponent(API_KEY)}&monitors=${MONITOR_ID}&format=json&response_times=1&custom_uptime_ratios=1-7-30-365&logs=0`
                });
                
                if (!response.ok) throw new Error('API response not ok');
                
                const data = await response.json();
                
                if (data.stat === 'ok' && data.monitors && data.monitors.length > 0) {
                    const monitor = data.monitors[0];
                    
                    // 更新在线时长（优先显示 30 天在线率，没有则显示全部时间）
                    const uptime30 = monitor.custom_uptime_ratio;
                    const uptimeAll = monitor.all_time_uptime_ratio;
                    const uptimeValue = uptime30 || uptimeAll || '99.9';
                    const uptimeEl = document.getElementById('uptime');
                    if (uptimeEl) uptimeEl.textContent = parseFloat(uptimeValue).toFixed(2) + '%';
                    
                    // 更新响应时间（平均响应时间）
                    const avgResponse = monitor.average_response_time;
                    const responseEl = document.getElementById('response-time');
                    if (responseEl && avgResponse) {
                        responseEl.textContent = Math.round(avgResponse) + 'ms';
                    }
                    
                    // 更新在线状态标签（替代 shields.io 徽章）
                    const statusEl = document.getElementById('uptime-status');
                    if (statusEl) {
                        const isUp = monitor.status === 2;
                        statusEl.textContent = isUp ? '● 在线' : '● 离线';
                        statusEl.style.color = isUp ? 'var(--success)' : 'var(--error)';
                    }
                    
                    console.log('UptimeRobot data loaded:', monitor.status);
                } else {
                    console.warn('UptimeRobot API returned no data:', data);
                }
            } catch (err) {
                console.error('Failed to fetch UptimeRobot data:', err);
                // 保留默认值，静默失败
            }
        }
        
        fetchUptimeData();
    </script>
</body>
